<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KindlyClick Audio</title>
    <style>
      :root {
        --bg: #f7f8f5;
        --panel: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --danger: #b91c1c;
      }

      body {
        margin: 0;
        padding: 12px;
        font: 14px/1.4 "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(circle at top left, #ecfdf5 0%, var(--bg) 58%);
        color: var(--ink);
      }

      .card {
        background: var(--panel);
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }

      .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .row > * {
        flex: 1;
      }

      label {
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-weight: 600;
      }

      input,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
      }

      button {
        cursor: pointer;
        background: #f8fafc;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      button.danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      #status {
        margin-top: 10px;
        font-weight: 600;
      }

      #micInfo {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      #visionInfo {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      #log {
        margin-top: 10px;
        max-height: 220px;
        overflow: auto;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #f8fafc;
        padding: 8px;
        font-size: 12px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <label for="wsUrl">Backend WebSocket URL</label>
      <input id="wsUrl" type="text" value="ws://127.0.0.1:8091/ws" />

      <div class="row">
        <button id="connectBtn" class="primary">Connect</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
      </div>

      <label for="micSelect">Microphone Device</label>
      <div class="row">
        <select id="micSelect"></select>
        <button id="refreshMicBtn">Refresh Mics</button>
      </div>

      <div class="row">
        <button id="requestMicBtn">Request Mic</button>
      </div>

      <div class="row">
        <button id="startMicBtn" disabled>Start Mic</button>
        <button id="endTurnBtn" disabled>End Turn</button>
        <button id="stopMicBtn" class="danger" disabled>Stop Mic</button>
      </div>

      <div class="row">
        <button id="startVisionBtn">Start Vision</button>
        <button id="stopVisionBtn" class="danger" disabled>Stop Vision</button>
      </div>

      <div class="row">
        <button id="askVisionBtn" disabled>Ask: What do you see?</button>
      </div>

      <div id="status">Status: idle</div>
      <div id="micInfo">Mic: not requested</div>
      <div id="visionInfo">Vision: idle</div>
      <div id="log"></div>
    </div>

    <script src="src/audioController.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
