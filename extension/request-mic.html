<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KindlyClick Microphone Access</title>
    <style>
      :root {
        --bg: #f6faf8;
        --panel: #ffffff;
        --ink: #1f2937;
        --muted: #4b5563;
        --accent: #0f766e;
        --border: #d1d5db;
      }

      body {
        margin: 0;
        padding: 28px 18px;
        background: radial-gradient(circle at top left, #dcfce7 0%, var(--bg) 50%);
        color: var(--ink);
        font: 16px/1.45 "Segoe UI", Tahoma, sans-serif;
      }

      .panel {
        max-width: 560px;
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 12px;
        font: inherit;
        cursor: pointer;
        background: #f8fafc;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      #status {
        margin-top: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Allow microphone for KindlyClick</h1>
      <p>
        If Chrome did not show a prompt inside the side panel, click the button below and allow
        microphone access in this tab.
      </p>
      <p>After access is granted, return to the side panel and click <strong>Start Mic</strong>.</p>
      <div class="actions">
        <button id="allowBtn" class="primary">Allow Microphone</button>
        <button id="closeBtn">Close Tab</button>
      </div>
      <div id="status">Status: ready</div>
    </main>
    <script src="request-mic.js"></script>
  </body>
</html>
